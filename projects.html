---
layout: default
title: projects
permalink: /projects/
---
<section class="section">
  <h1># proyectos</h1>
  <div class="prompt-line"><span class="prompt-user">david@dev</span>:<span class="prompt-path">~/proyectos</span>$ ls -la</div>
  <ul class="project-list">
    {% for p in site.projects %}
      <li>
        <a href="{{ p.url | relative_url }}" class="project-card">
          <span class="project-head">
            <span class="perm">drwxr-xr-x</span>
            <span class="title">{{ p.title }}</span>
            {% if p.stack %}<span class="stack-inline">{{ p.stack | join: ', ' }}</span>{% endif %}
          </span>
          {% if p.summary %}<span class="summary">{{ p.summary }}</span>{% endif %}
        </a>
      </li>
    {% endfor %}
  </ul>
</section>
