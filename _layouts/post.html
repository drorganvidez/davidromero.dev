---
layout: default
---
<article class="post">
  <header class="post-header">
    <div class="prompt">david@dev:~/blog$ cat {{ page.title | slugify }}.md</div>
    <h1>{{ page.title }}</h1>
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  {%- include share.html -%}
</article>
