{%- assign share_url = page.url | absolute_url -%}
{%- assign share_title = page.title -%}
{%- assign u = share_url | url_encode -%}
{%- assign t = share_title | url_encode -%}
<nav class="share" aria-label="Compartir">
  <span class="share-label">$ share --via</span>
  <ul class="share-list">
    <li>
      <a class="share-btn x"
         href="https://twitter.com/intent/tweet?url={{ u }}&text={{ t }}"
         target="_blank" rel="noopener noreferrer" aria-label="Compartir en X">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M18.244 2H21l-6.49 7.41L22 22h-6.79l-4.73-6.18L4.9 22H2.14l6.94-7.93L2 2h6.96l4.29 5.66L18.24 2Zm-2.38 18h1.9L8.23 4H6.22l9.64 16Z"/></svg>
        <span>X</span>
      </a>
    </li>
    <li>
      <a class="share-btn fb"
         href="https://www.facebook.com/sharer/sharer.php?u={{ u }}"
         target="_blank" rel="noopener noreferrer" aria-label="Compartir en Facebook">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M22 12a10 10 0 1 0-11.56 9.88v-6.99H7.9V12h2.54V9.8c0-2.5 1.49-3.89 3.78-3.89 1.1 0 2.24.2 2.24.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56V12h2.77l-.44 2.89h-2.33v6.99A10 10 0 0 0 22 12Z"/></svg>
        <span>Facebook</span>
      </a>
    </li>
    <li>
      <a class="share-btn wa"
         href="https://api.whatsapp.com/send?text={{ t }}%20{{ u }}"
         target="_blank" rel="noopener noreferrer" aria-label="Compartir en WhatsApp">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M20.52 3.48A11.84 11.84 0 0 0 12.04 0C5.46 0 .1 5.36.1 11.94c0 2.1.55 4.15 1.6 5.96L0 24l6.28-1.64a11.92 11.92 0 0 0 5.76 1.47h.01c6.58 0 11.94-5.36 11.94-11.94a11.85 11.85 0 0 0-3.47-8.41ZM12.04 21.8h-.01a9.9 9.9 0 0 1-5.04-1.38l-.36-.22-3.73.98 1-3.64-.24-.37a9.9 9.9 0 1 1 18.32-5.23A9.9 9.9 0 0 1 12.04 21.8Zm5.43-7.4c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.25-.46-2.38-1.47a8.9 8.9 0 0 1-1.65-2.05c-.17-.3-.02-.46.13-.6.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.62-.92-2.22-.24-.58-.48-.5-.67-.51h-.57c-.2 0-.52.07-.8.37-.27.3-1.05 1.02-1.05 2.5 0 1.46 1.07 2.88 1.22 3.08.15.2 2.12 3.23 5.13 4.54.72.3 1.27.48 1.7.62.72.23 1.37.2 1.88.12.57-.08 1.76-.72 2-1.42.25-.7.25-1.3.17-1.42-.07-.13-.27-.2-.57-.35Z"/></svg>
        <span>WhatsApp</span>
      </a>
    </li>
    <li>
      <a class="share-btn li"
         href="https://www.linkedin.com/sharing/share-offsite/?url={{ u }}"
         target="_blank" rel="noopener noreferrer" aria-label="Compartir en LinkedIn">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.35V9h3.41v1.56h.05a3.74 3.74 0 0 1 3.37-1.85c3.6 0 4.27 2.37 4.27 5.46v6.28ZM5.34 7.43a2.07 2.07 0 1 1 0-4.13 2.07 2.07 0 0 1 0 4.13Zm1.78 13.02H3.56V9h3.56v11.45ZM22.22 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45C23.2 24 24 23.23 24 22.28V1.72C24 .77 23.2 0 22.22 0Z"/></svg>
        <span>LinkedIn</span>
      </a>
    </li>
    <li>
      <a class="share-btn tg"
         href="https://t.me/share/url?url={{ u }}&text={{ t }}"
         target="_blank" rel="noopener noreferrer" aria-label="Compartir en Telegram">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.3-.07-.46-.52-.19L7.74 13.46 3.64 12.2c-.88-.26-.89-.87.2-1.29L19.8 4.89c.73-.33 1.43.18 1.15 1.29l-2.72 12.81c-.19.91-.74 1.13-1.5.7l-4.14-3.06-2 1.94c-.23.23-.42.42-.85.42z"/></svg>
        <span>Telegram</span>
      </a>
    </li>
    <li>
      <button class="share-btn copy" type="button" data-copy-url="{{ share_url }}" aria-label="Copiar enlace">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1Zm3 4H8a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm0 16H8V7h11v14Z"/></svg>
        <span class="copy-text">Copiar enlace</span>
      </button>
    </li>
  </ul>
</nav>
