# jekyll-seo-tag + social previews (og: / twitter:)
logo: /assets/img/logo.png
image: /assets/img/og.png
twitter:
  username: drorganvidez
  card: summary_large_image
social:
  name: David Romero Organvídez
  links:
    - https://github.com/drorganvidez
    - https://www.linkedin.com/in/davidromeroorganvidez/
