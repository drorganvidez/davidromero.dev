title: David Romero Organvídez
tagline: "SPL researcher · Full-stack engineer"
description: >-
  David Romero Organvídez — Ingeniero del Software por la Universidad de Sevilla,
  doctorando en Software Product Lines. Autor de UVLHub y SPLENT.
url: "https://davidromero.dev"
baseurl: ""
lang: es
